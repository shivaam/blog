{{/* Syntax highlighting: light by default, dark via prefers-color-scheme */}}
{{ $light := resources.Get "css/syntax-light.css" | minify }}
{{ $dark := resources.Get "css/syntax-dark.css" | minify }}
<style>
{{ $light.Content | safeCSS }}

/* Make code blocks have breathing room and scroll horizontally on overflow */
.highlight {
  padding: 12px 16px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 1em 0;
  font-size: 0.9em;
  line-height: 1.5;
}
.highlight pre {
  margin: 0;
  padding: 0;
  background: transparent !important;
}
.highlight code {
  background: transparent !important;
  padding: 0;
  font-size: inherit;
}

@media (prefers-color-scheme: dark) {
{{ $dark.Content | safeCSS }}
}
</style>
